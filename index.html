<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSL 3D Avatar – Ngôn ngữ Ký hiệu Việt Nam</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="jarvis_model.js"></script>
<script src="vsl_avatar_db.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0d19; --surface: #121526; --surface2: #1b1f38;
  --border: #292e54; --accent1: #6c63ff; --accent2: #00d4ff;
  --text: #e8eaf6; --muted: #8891b5; --green: #4cef9b; --r: 12px;
}
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

header {
  padding:14px 28px; border-bottom:1px solid var(--border);
  background:rgba(18,21,38,.92); backdrop-filter:blur(14px);
  display:flex; align-items:center; justify-content:space-between; z-index:10;
}
.logo { display:flex; align-items:center; gap:10px; font-size:1.2rem; font-weight:700;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logo-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--accent1),var(--accent2));
  border-radius:9px; display:flex; align-items:center; justify-content:center;
  font-size:17px; -webkit-text-fill-color:white; box-shadow:0 4px 16px rgba(108,99,255,.4); }
.badges { display:flex; gap:10px; font-size:.78rem; }
.badge { background:var(--surface2); border:1px solid var(--border); padding:4px 11px; border-radius:20px; color:var(--muted); }
.badge span { color:var(--accent2); font-weight:600; }

.main { display:flex; flex:1; min-height:0; }

.sidebar { width:320px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.search-wrap { padding:18px 18px 10px; border-bottom:1px solid var(--border); }
.search-box { position:relative; }
.search-box input { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--r);
  padding:11px 14px 11px 40px; color:var(--text); font-size:.9rem; outline:none; transition:border-color .2s; }
.search-box input:focus { border-color:var(--accent1); }
.s-ico { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px; }
.wcount { margin-top:7px; font-size:.76rem; color:var(--muted); padding-left:3px; }

.wlist { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.witem { padding:11px 18px; border-bottom:1px solid rgba(41,46,84,.35); cursor:pointer;
  display:flex; align-items:center; justify-content:space-between; transition:background .12s; }
.witem:hover { background:var(--surface2); }
.witem.active { background:rgba(108,99,255,.22); border-left:3px solid var(--accent1); }
.wname { font-size:.88rem; font-weight:500; }
.witem.active .wname { color:var(--accent1); font-weight:600; }
.widx { font-size:.7rem; color:var(--muted); background:var(--surface2); padding:2px 6px; border-radius:5px; }

.viewport { flex:1; position:relative; }
#c3d { width:100%; height:100%; display:block; }

.overlay-bottom {
  position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
  background:rgba(18,21,38,.88); border:1px solid var(--border); backdrop-filter:blur(14px);
  border-radius:14px; padding:11px 22px; display:flex; align-items:center; gap:18px;
  box-shadow:0 8px 32px rgba(0,0,0,.5); z-index:5; white-space:nowrap;
}
.cur-title { font-size:.9rem; font-weight:600; color:var(--accent2); max-width:180px; overflow:hidden; text-overflow:ellipsis; }
.btn { background:var(--surface2); border:1px solid var(--border); color:var(--text);
  padding:7px 14px; border-radius:8px; font-size:.82rem; font-weight:600; cursor:pointer; transition:all .15s; }
.btn:hover { background:var(--accent1); border-color:var(--accent1); color:#fff; }
.sel { background:var(--surface2); border:1px solid var(--border); color:var(--text);
  padding:5px 10px; border-radius:7px; font-size:.8rem; outline:none; cursor:pointer; }

.overlay-top {
  position:absolute; top:18px; left:18px;
  background:rgba(18,21,38,.78); border:1px solid var(--border);
  backdrop-filter:blur(8px); border-radius:9px; padding:9px 14px; font-size:.76rem; color:var(--muted); z-index:5;
}
.overlay-top strong { color:var(--green); }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon">🤖</div>VSL 3D Avatar Retargeting</div>
  <div class="badges">
    <div class="badge">Model: <span>jarvis.glb (67 Joints)</span></div>
    <div class="badge">Engine: <span>Dual-Arm 3D IK & Holistic</span></div>
    <div class="badge">Chế độ: <span>100% Offline</span></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="search-wrap">
      <div class="search-box">
        <span class="s-ico">🔍</span>
        <input id="q" type="text" placeholder="Tìm từ vựng VSL..." autocomplete="off" spellcheck="false">
      </div>
      <div class="wcount" id="wc">Đang tải...</div>
    </div>
    <div class="wlist" id="wl"></div>
  </div>

  <div class="viewport">
    <div class="overlay-top" id="st">Trạng thái: <strong>Đang khởi tạo...</strong></div>
    <canvas id="c3d"></canvas>
    <div class="overlay-bottom">
      <div class="cur-title" id="cg">Chưa chọn từ</div>
      <button class="btn" id="pb">▶ Phát</button>
      <button class="btn" id="rb">🔄 Lặp lại</button>
      <button class="btn" id="cb">🎯 Camera</button>
      <select class="sel" id="sp">
        <option value="0.5">0.5×</option>
        <option value="1" selected>1.0×</option>
        <option value="1.5">1.5×</option>
      </select>
    </div>
  </div>
</div>

<script>
let db = {}, words = [], filtered = [], active = null;
let scene, cam, ren, ctrl, avatar = null, bones = {};
let playing = false, fi = 0, speed = 1, lastT = 0;

function initScene() {
  const vp = document.querySelector('.viewport');
  const cv = document.getElementById('c3d');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b0d19);

  cam = new THREE.PerspectiveCamera(45, vp.clientWidth/vp.clientHeight, 0.01, 100);
  cam.position.set(0, 1.25, 1.7);

  ren = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
  ren.setSize(vp.clientWidth, vp.clientHeight);
  ren.setPixelRatio(window.devicePixelRatio);
  ren.shadowMap.enabled = true;

  ctrl = new THREE.OrbitControls(cam, ren.domElement);
  ctrl.target.set(0, 1.05, 0);
  ctrl.enableDamping = true;
  ctrl.dampingFactor = 0.06;

  scene.add(new THREE.AmbientLight(0xffffff, 0.9));
  const dl1 = new THREE.DirectionalLight(0x8080ff, 1.2);
  dl1.position.set(2, 3, 2);
  scene.add(dl1);
  const dl2 = new THREE.DirectionalLight(0x00d4ff, 0.8);
  dl2.position.set(-2, 2, -1);
  scene.add(dl2);

  scene.add(new THREE.GridHelper(10, 20, 0x292e54, 0x1b1f38));

  setStatus('Đang nạp nhân vật 3D (jarvis.glb)...');
  const src = (window.JARVIS_BASE64 && window.JARVIS_BASE64.length > 200) ? window.JARVIS_BASE64 : 'jarvis.glb';
  new THREE.GLTFLoader().load(src, gltf => {
    avatar = gltf.scene;
    scene.add(avatar);
    avatar.traverse(n => {
      if (n.isBone) {
        bones[n.name] = n;
        n.userData.restQ = n.quaternion.clone();
      }
    });
    setStatus('Avatar 3D sẵn sàng! Chọn từ vựng VSL bên trái để xem.');
    initDB();
  }, undefined, e => { console.error(e); setStatus('❌ Lỗi nạp jarvis.glb'); });

  window.addEventListener('resize', () => {
    cam.aspect = vp.clientWidth/vp.clientHeight;
    cam.updateProjectionMatrix();
    ren.setSize(vp.clientWidth, vp.clientHeight);
  });

  loop();
}

function setStatus(msg) {
  document.getElementById('st').innerHTML = 'Trạng thái: <strong>' + msg + '</strong>';
}

function initDB() {
  const raw = (window.DB_DATA && Object.keys(window.DB_DATA).length) ? window.DB_DATA : null;
  if (raw) { loadWords(raw); return; }
  fetch('vsl_avatar_db.json').then(r=>r.json()).then(loadWords).catch(e=>{
    document.getElementById('wc').textContent = '❌ Không tải được DB';
  });
}

function loadWords(data) {
  db = data;
  words = Object.keys(db).sort((a,b) => a.localeCompare(b,'vi'));
  filtered = [...words];
  document.getElementById('wc').textContent = `${words.length} / ${words.length} từ`;
  renderList();
  if (words.length) selectWord(words[0]);
}

function renderList() {
  const el = document.getElementById('wl');
  if (!filtered.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:.85rem">Không tìm thấy từ</div>';
    return;
  }
  el.innerHTML = filtered.map(w => `
    <div class="witem ${w===active?'active':''}" onclick="selectWord('${w.replace(/'/g,"\\'")}')">
      <span class="wname">${w}</span>
      <span class="widx">#${words.indexOf(w)+1}</span>
    </div>`).join('');
}

function selectWord(w) {
  active = w;
  fi = 0; playing = true; lastT = 0;
  document.getElementById('cg').textContent = w;
  document.getElementById('pb').textContent = '⏸ Tạm dừng';
  renderList();
}

// ─── Dual-Arm 3D IK & Finger Flexion Engine ──────────────────────
const Q = THREE.Quaternion;
const E = THREE.Euler;
const V3 = THREE.Vector3;

const L1 = 0.28; // Upper arm length
const L2 = 0.25; // Forearm length

const ARM_REST_R = new V3(0.15, -0.92, 0.35).normalize();
const ARM_REST_L = new V3(-0.15, -0.92, 0.35).normalize();

function applyFrame(frame) {
  if (!avatar || !frame) return;

  // Apply Right Arm & Hand
  if (frame.r_pos) {
    applyArmIK('Right', frame.r_pos, frame.r_ori, frame.r_cu, ARM_REST_R, -1);
  }
  // Apply Left Arm & Hand
  if (frame.l_pos) {
    applyArmIK('Left', frame.l_pos, frame.l_ori, frame.l_cu, ARM_REST_L, 1);
  }
}

function applyArmIK(side, pos, ori, cu, restDir, elbowSign) {
  const armB  = bones[`${side}Arm`];
  const foreB = bones[`${side}ForeArm`];
  const handB = bones[`${side}Hand`];

  if (!armB || !pos) return;

  // 1. Solve 2-joint IK for Target Hand Position (tx, ty, tz)
  const targetPos = new V3(pos[0], pos[1], pos[2]);
  let dist = targetPos.length();
  dist = THREE.MathUtils.clamp(dist, 0.08, L1 + L2 - 0.02);

  const targetDir = targetPos.clone().normalize();
  const qArm = new Q().setFromUnitVectors(restDir, targetDir);
  armB.quaternion.copy(armB.userData.restQ).premultiply(qArm);

  // 2. Elbow Flexion Angle (Cosine Law)
  if (foreB) {
    let cosElbow = (L1 * L1 + L2 * L2 - dist * dist) / (2 * L1 * L2);
    cosElbow = THREE.MathUtils.clamp(cosElbow, -1.0, 1.0);
    const flexAngle = Math.PI - Math.acos(cosElbow);

    const qElbow = new Q().setFromAxisAngle(new V3(0, 0, elbowSign * flexAngle * 0.95), 1);
    foreB.quaternion.copy(foreB.userData.restQ).multiply(qElbow);
  }

  // 3. Wrist Orientation (Pitch & Yaw)
  if (handB && ori) {
    const qHand = new Q().setFromEuler(new E((ori[0]||0) * 0.8, (ori[1]||0) * 0.8, 0, 'XYZ'));
    handB.quaternion.copy(handB.userData.restQ).multiply(qHand);
  }

  // 4. Precise 5-Finger Flexion (Thumb, Index, Middle, Ring, Pinky)
  if (cu && cu.length >= 5) {
    const fingerNames = ['Thumb', 'Index', 'Middle', 'Ring', 'Pinky'];
    fingerNames.forEach((fname, i) => {
      const curlVal = cu[i] || 0.0;

      for (let j = 1; j <= 3; j++) {
        const fb = bones[`${side}Hand${fname}${j}`];
        if (!fb) continue;

        if (fname === 'Thumb') {
          const fVal = curlVal * (j === 1 ? 0.5 : 0.3);
          const qCurl = new Q().setFromEuler(new E(fVal * 0.7, fVal * 0.5, 0, 'XYZ'));
          fb.quaternion.copy(fb.userData.restQ).multiply(qCurl);
        } else {
          // Index, Middle, Ring, Pinky: Flexion around Local X axis!
          const factor = (j === 1) ? 0.55 : (j === 2 ? 0.35 : 0.25);
          const flexAngle = curlVal * factor;
          const qCurl = new Q().setFromAxisAngle(new V3(1, 0, 0), flexAngle);
          fb.quaternion.copy(fb.userData.restQ).multiply(qCurl);
        }
      }
    });
  }
}

function loop(ts) {
  requestAnimationFrame(loop);
  ctrl.update();

  if (playing && active && db[active] && avatar) {
    const anim = db[active];
    const frames = anim.frames;
    if (!frames || !frames.length) { ren.render(scene, cam); return; }

    if (!lastT) lastT = ts;
    const interval = 1000 / (anim.fps * speed);
    if (ts - lastT > interval) {
      lastT = ts;
      applyFrame(frames[fi]);
      fi = (fi + 1) % frames.length;
    }
  }

  ren.render(scene, cam);
}

document.getElementById('q').addEventListener('input', e => {
  const s = e.target.value.trim().toLowerCase();
  filtered = s ? words.filter(w => w.toLowerCase().includes(s)) : [...words];
  document.getElementById('wc').textContent = `${filtered.length} / ${words.length} từ`;
  renderList();
});

document.getElementById('pb').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('pb').textContent = playing ? '⏸ Tạm dừng' : '▶ Phát';
});

document.getElementById('rb').addEventListener('click', () => {
  fi = 0; playing = true; lastT = 0;
  document.getElementById('pb').textContent = '⏸ Tạm dừng';
});

document.getElementById('cb').addEventListener('click', () => {
  cam.position.set(0, 1.25, 1.7);
  ctrl.target.set(0, 1.05, 0);
});

document.getElementById('sp').addEventListener('change', e => { speed = parseFloat(e.target.value); });

initScene();
</script>
</body>
</html>
